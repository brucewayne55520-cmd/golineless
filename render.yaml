services:
  - type: web
    name: golineless-api
    runtime: node
    plan: starter
    buildCommand: bash render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      # --- Core ---
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      # --- Frontend / CORS ---
      - key: FRONTEND_URL
        value: https://golineless.com
      - key: ALLOWED_ORIGINS
        value: https://golineless.com,https://www.golineless.com,http://localhost:5173
      # --- Payments (Razorpay) ---
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # --- SMS / OTP (Twilio) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_CONTENT_SID
        sync: false
      # --- Auth ---
      - key: AUTH_MODE
        value: self
      - key: NEON_AUTH_URL
        sync: false
      - key: NEON_AUTH_COOKIE_SECRET
        sync: false
      - key: NEON_DATA_API_URL
        sync: false
      # --- Photo Storage (Backblaze B2) ---
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: B2_ENDPOINT
        sync: false
      # --- Google OAuth ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      # --- UPI ---
      - key: UPI_ID
        sync: false
      # --- Error Monitoring (Sentry) ---
      - key: SENTRY_DSN
        sync: false
      # --- Logging ---
      - key: LOG_LEVEL
        value: info
