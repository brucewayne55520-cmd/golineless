          type: integer
          nullable: true
        category:
          type: string
          enum: [hospital, govt_office, bank, document, medicine, senior_care, errand, emergency]
        description:
          type: string
        status:
          type: string
          enum: [pending, assigned, on_the_way, reached_pickup, reached_task_location, at_location, in_progress, waiting_started, completed, cancelled]
        urgency:
          type: string
          enum: [normal, urgent]
        # Location
        locationName:
          type: string
          nullable: true
        locationArea:
          type: string
          nullable: true
        locationCity:
          type: string
          nullable: true
        locationLat:
          type: number
          nullable: true
        locationLng:
          type: number
          nullable: true
        distanceBand:
          type: string
          nullable: true
