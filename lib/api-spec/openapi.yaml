          type: string
          nullable: true
        completedAt:
          type: string
          nullable: true
        startedAt:
          type: string
          nullable: true
        reachedPickupAt:
          type: string
          nullable: true
        reachedTaskLocationAt:
          type: string
          nullable: true
        createdAt:
          type: string
        # Pricing
        basePrice:
