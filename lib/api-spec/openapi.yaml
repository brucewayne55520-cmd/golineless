openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Go LineLess API specification — Ahmedabad Pilot
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: pricing
    description: Pricing operations
  - name: users
    description: User operations
  - name: tasks
    description: Task operations
  - name: runners
    description: Runner operations
  - name: subscriptions
    description: Subscription operations
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin operations
  - name: operations
    description: Operations center, recruitment, training, quality, support, incidents
  - name: payments
    description: Payment operations
  - name: reviews
    description: Review operations
  - name: locations
    description: Runner location operations

paths:
  # ─── HEALTH ─────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to phone (user or runner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpInput"
      responses:
        "200":
          description: OTP sent (otp returned in dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: Authenticated — returns token + user/runner profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout (deletes session token)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login with admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Admin authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  # ─── PRICING ────────────────────────────────────────────────────────────────
  /pricing/preview:
    post:
      operationId: pricingPreview
      tags: [pricing]
      summary: Get authoritative backend pricing for a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingInput"
      responses:
        "200":
          description: Price breakdown (authoritative — frontend must not compute locally)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ─── USERS ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user stats (total tasks, hours saved, value saved)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  # ─── TASKS ──────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for current user or runner (scoped by auth)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (comma-separated for multiple)
        - name: role
          in: query
          schema:
            type: string
            enum: [user, runner]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of tasks with user/runner relations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task (booking) — triggers smart dispatch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created with dispatch info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/available:
    get:
      operationId: listAvailableTasks
      tags: [tasks]
      summary: List pending tasks for runners to accept
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available tasks (pending, with user info stripped)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID (scoped by ownership)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task with user/runner relations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/{id}/status:
    patch:
      operationId: updateTaskStatus
      tags: [tasks]
      summary: Update task status (state machine enforced)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusUpdate"
      responses:
        "200":
          description: Updated task with timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/{id}/accept:
    post:
      operationId: acceptTask
      tags: [tasks]
      summary: Runner accepts a task (with duplicate acceptance protection)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/{id}/verify-otp:
    post:
      operationId: verifyTaskOtp
      tags: [tasks]
      summary: Verify task OTP to mark complete (with brute force protection)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskOtpVerify"
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "429":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/{id}/cancel:
    post:
      operationId: cancelTask
      tags: [tasks]
      summary: Cancel a task (user, runner, or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/review:
    post:
      operationId: submitReview
      tags: [reviews]
      summary: Submit a review for a completed task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /tasks/{id}/proof-photo:
    post:
      operationId: uploadProofPhoto
      tags: [tasks]
      summary: Upload proof photo (with GPS validation and duplicate detection)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofPhotoInput"
      responses:
        "200":
          description: Task with updated proof photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /tasks/{id}/waiting/start:
    post:
      operationId: startWaiting
      tags: [tasks]
      summary: Start waiting timer for queue-based tasks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task with waiting timer started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/waiting/pause:
    post:
      operationId: pauseWaiting
      tags: [tasks]
      summary: Pause waiting timer and calculate charge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task with waiting paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/waiting/end:
    post:
      operationId: endWaiting
      tags: [tasks]
      summary: End waiting timer (alias for pause with completion)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task with waiting ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/queue/progress:
    post:
      operationId: updateQueueProgress
      tags: [tasks]
      summary: Update queue progress (token number, counter, ETA)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueProgressInput"
      responses:
        "200":
          description: Task with updated queue info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/family-tracking:
    post:
      operationId: generateFamilyTrackingLink
      tags: [tasks]
      summary: Generate a shareable family tracking link for a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyTrackingInput"
      responses:
        "200":
          description: Family tracking token and share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyTrackingResponse"

  /tasks/{id}/timeline:
    get:
      operationId: getTaskTimeline
      tags: [tasks]
      summary: Get task timeline entries
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Array of timeline entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /family/track/{token}:
    get:
      operationId: familyTrackByToken
      tags: [tasks]
      summary: Public read-only family tracking (no auth required)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task and runner status for family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyTrackResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "410":
          $ref: "#/components/responses/ErrorResponse"

  # ─── RUNNERS ────────────────────────────────────────────────────────────────
  /runners/me:
    get:
      operationId: getRunnerMe
      tags: [runners]
      summary: Get current runner profile (with trust/earnings fields)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runner profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"
    patch:
      operationId: updateRunnerMe
      tags: [runners]
      summary: Update current runner profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunnerUpdate"
      responses:
        "200":
          description: Updated runner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"

  /runners/me/earnings:
    get:
      operationId: getRunnerEarnings
      tags: [runners]
      summary: Get runner earnings summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerEarnings"

  /runners/me/earnings/daily:
    get:
      operationId: getRunnerDailyEarnings
      tags: [runners]
      summary: Get daily earnings for last 7 days (chart data)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Daily earnings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyEarning"

  /runners/kyc:
    post:
      operationId: submitKyc
      tags: [runners]
      summary: Submit or update KYC documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInput"
      responses:
        "200":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"

  /runners/toggle-online:
    post:
      operationId: toggleOnlineStatus
      tags: [runners]
      summary: Toggle runner online/offline status
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnlineStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"

  /runners/me/onboarding:
    post:
      operationId: saveOnboardingStep
      tags: [runners]
      summary: Save onboarding step data (step 1-6 wizard)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingInput"
      responses:
        "200":
          description: Updated runner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"

  /runners/me/gps-check:
    post:
      operationId: gpsHealthCheck
      tags: [runners]
      summary: Save GPS health status (granted/denied/unavailable)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsCheckInput"
      responses:
        "200":
          description: Updated runner with trust score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"

  /runners/me/active-tasks:
    get:
      operationId: getActiveTask
      tags: [runners]
      summary: Get runner's single active task (most recent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active task with user info or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /runners/me/readiness:
    get:
      operationId: getRunnerReadiness
      tags: [runners]
      summary: Compute dispatch readiness score (0-100%)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Readiness score and breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /runners/playbook:
    get:
      operationId: getRunnerPlaybook
      tags: [runners]
      summary: Get operations playbook for runners
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Playbook sections and rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybookResponse"

  /runners/available:
    get:
      operationId: listAvailableRunners
      tags: [runners]
      summary: List available online/verified runners for booking preview
      responses:
        "200":
          description: Available runners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableRunner"

  /runners/nearby/{taskId}:
    get:
      operationId: listNearbyRunners
      tags: [runners]
      summary: List nearby available runners for a task (with distance)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nearby runners sorted by distance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyRunner"

  /runners/{id}:
    get:
      operationId: getRunner
      tags: [runners]
      summary: Get runner by ID (public — phone/email/aadhaar redacted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Runner (sensitive fields stripped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicRunner"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /runners/{id}/location/{taskId}:
    get:
      operationId: getRunnerLocation
      tags: [locations]
      summary: Get latest runner location for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Runner location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerLocation"

  # ─── SUBSCRIPTIONS ──────────────────────────────────────────────────────────
  /subscriptions/plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      summary: List available subscription plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current user's active subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions:
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Subscribe to a plan (cancels existing active subscription)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user or runner
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read (with ownership check)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── PAYMENTS ──────────────────────────────────────────────────────────────
  /payments/create-order:
    post:
      operationId: createPaymentOrder
      tags: [payments]
      summary: Create a Razorpay payment order for a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: integer
      responses:
        "200":
          description: Payment order created (or cash method info)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /subscriptions/create-order:
    post:
      operationId: createSubscriptionOrder
      tags: [subscriptions]
      summary: Create a Razorpay payment order for a subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: string
                billingCycle:
                  type: string
                  enum: [monthly, yearly]
                  default: monthly
      responses:
        "200":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "403":
