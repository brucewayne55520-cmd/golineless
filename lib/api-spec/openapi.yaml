components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
              detail:
                type: string
              code:
                type: string

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ─── AUTH SCHEMAS ────────────────────────────────────────────────────────
    SendOtpInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
        role:
          type: string
          enum: [user, runner]

    OtpResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        otp:
          type: string
          description: Returned only in dev mode
        sent:
          type: boolean
          description: Whether the SMS was sent successfully

    VerifyOtpInput:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
        otp:
          type: string
        role:
          type: string
          enum: [user, runner]

    AuthResponse:
      type: object
      required: [token, role]
      properties:
        token:
          type: string
        role:
          type: string
        user:
          $ref: "#/components/schemas/User"
        runner:
          $ref: "#/components/schemas/Runner"

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    # ─── PRICING SCHEMAS ──────────────────────────────────────────────────────
    PricingInput:
      type: object
      properties:
        category:
          type: string
          enum: [hospital, govt_office, bank, document, medicine, senior_care, errand, emergency]
          default: hospital
        distanceBand:
          type: string
          enum: ["0-2", "2-5", "5+"]
          default: "0-2"
        urgency:
          type: string
          enum: [normal, urgent]
          default: normal
        priorityLevel:
          type: string
          default: normal
        couponCode:
          type: string

    PricingResponse:
      type: object
      properties:
        price:
          type: number
          description: Final price after discount
        originalPrice:
          type: number
        discountAmount:
          type: number
        appliedCoupon:
          type: string
          nullable: true
        breakdown:
          type: object
          properties:
            basePrice:
              type: number
            distanceCharge:
              type: number
            urgencyCharge:
              type: number
            priorityFee:
              type: number
            urgencyMultiplier:
              type: number
            subtotalBeforeMultiplier:
              type: number
            subtotalAfterMultiplier:
              type: number
            runnerEarning:
              type: number
            platformFee:
              type: number
        meta:
          type: object
          properties:
            calculatedAt:
              type: string
            authoritative:
              type: boolean
            note:
              type: string

    # ─── USER SCHEMAS ────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, phone]
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        area:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        language:
          type: string
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        city:
          type: string
        area:
          type: string
        language:
          type: string

    UserStats:
      type: object
      required: [totalTasks, hoursSaved, valueSaved]
      properties:
        totalTasks:
          type: integer
        hoursSaved:
          type: number
        valueSaved:
          type: number

    # ─── TASK SCHEMAS ────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, category, status, price, createdAt]
      properties:
        # Core
        id:
          type: integer
        userId:
          type: integer
          nullable: true
        runnerId:
          type: integer
          nullable: true
