kind = "web"
previewPath = "/"
title = "QBuddy"
version = "1.0.0"
id = "artifacts/qbuddy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19043

[services.development]
run = "pnpm --filter @workspace/qbuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qbuddy", "run", "build" ]
publicDir = "artifacts/qbuddy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19043"
BASE_PATH = "/"
